version: '3.8'

services:
  meeting-summarizer:
    build: .
    container_name: meeting-summarizer
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./static:/app/static
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEXGPT_API_KEY=${YANDEXGPT_API_KEY}
      - MAX_FILE_SIZE_MB=2000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

